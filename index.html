<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRRO — MONITORING INVENTAIRE 2026</title>
<!-- Bibliothèques -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;500;600;700&display=swap');

:root {
  /* Mode Clair (Défaut) */
  --bg: #f8fafc; --s1: #ffffff; --s2: #f1f5f9; --s3: #e2e8f0;
  --bd: #e2e8f0; --bd2: #cbd5e1;
  --acc: #6c47e8; --acc-hover: #5a38cc;
  --tx: #0f172a; --tx2: #475569; --tx3: #94a3b8;
  --acc3: #10b981; --amber: #f59e0b; --red: #ef4444;
  --r: 8px; --r2: 12px; --r3: 20px;
}

/* Mode Sombre */
body.dark-theme {
  --bg: #0f172a; --s1: #1e293b; --s2: #334155; --s3: #475569;
  --bd: #334155; --bd2: #475569;
  --tx: #f8fafc; --tx2: #cbd5e1; --tx3: #64748b;
  --acc: #8b5cf6;
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, color 0.1s; }
body { background: var(--bg); color: var(--tx); font-family: 'Syne', sans-serif; font-size: 14px; min-height: 100vh; overflow-x: hidden; }

/* ── SKELETON LOADER ── */
.skeleton { background: var(--s3); position: relative; overflow: hidden; border-radius: 4px; }
.skeleton::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shine 1.5s infinite;
}
@keyframes shine { 100% { transform: translateX(100%); } }

/* ── LOGIN ── */
#loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
.login-box { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--r3); padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
.zone-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
.z-btn { border: 2px solid var(--bd); border-radius: var(--r2); padding: 15px 5px; cursor: pointer; text-align: center; background: var(--s1); }
.z-btn.sel { border-color: var(--acc); background: rgba(108, 71, 232, 0.05); }
.z-btn-icon { font-size: 20px; display: block; margin-bottom: 5px; }

/* ── HEADER & NAV ── */
header { height: 64px; background: var(--s1); border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
.nav-bar { background: var(--s1); border-bottom: 1px solid var(--bd); padding: 0 24px; display: flex; gap: 10px; }
.tab { padding: 15px 20px; font-family: 'JetBrains Mono'; font-size: 12px; cursor: pointer; border: none; background: none; color: var(--tx3); font-weight: 600; border-bottom: 2px solid transparent; }
.tab.on { color: var(--acc); border-bottom-color: var(--acc); }

/* ── DASHBOARD ── */
main { padding: 24px; max-width: 1400px; margin: 0 auto; }
.panel { display: none; } .panel.on { display: block; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--s1); border: 1px solid var(--bd); padding: 20px; border-radius: var(--r2); position: relative; }
.kpi-card::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 4px; background: var(--c); border-radius: 0 4px 4px 0; }
.kpi-label { font-size: 11px; font-family: 'JetBrains Mono'; color: var(--tx3); text-transform: uppercase; letter-spacing: 0.05em; }
.kpi-val { font-size: 28px; font-weight: 700; margin: 5px 0; font-family: 'JetBrains Mono'; }

/* ── TABLES ── */
.table-container { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--r2); overflow: hidden; }
.table-header { padding: 16px; border-bottom: 1px solid var(--bd); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--s2); padding: 12px 15px; text-align: left; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--tx3); text-transform: uppercase; cursor: pointer; }
td { padding: 12px 15px; border-bottom: 1px solid var(--bd); color: var(--tx2); font-size: 13px; }
tr:hover td { background: var(--s2); }

/* ── BUTTONS ── */
.btn { padding: 8px 16px; border-radius: var(--r); font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; border: 1px solid var(--bd); background: var(--s1); color: var(--tx); display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--acc); color: white; border: none; }
.btn-primary:hover { background: var(--acc-hover); }

/* ── DARK MODE SWITCH ── */
.theme-toggle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--s2); border: 1px solid var(--bd); }

/* ── PRINT / PDF ── */
@media print {
  header, .nav-bar, .table-header, .pag, .theme-toggle, .btn-logout { display: none !important; }
  main { padding: 0; }
  .kpi-card { border: 1px solid #000; break-inside: avoid; }
  .panel { display: block !important; }
}

</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
  <div style="width: 300px;">
    <div style="font-family:'JetBrains Mono'; font-size:12px; margin-bottom:10px; text-align:center;" id="loadMsg">Synchronisation Drive...</div>
    <div style="height:4px; background:var(--s3); border-radius:10px; overflow:hidden;">
      <div id="loadBar" style="height:100%; width:0%; background:var(--acc); transition:width 0.3s"></div>
    </div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="text-align:center; margin-bottom:30px">
        <h2 style="font-weight:700">DRRO <span style="color:var(--acc)">Dashboard</span></h2>
        <p style="font-size:12px; color:var(--tx3); margin-top:5px">Inventaire Immobilisations 2026</p>
    </div>
    
    <div class="zone-grid">
      <div class="z-btn" id="zb-CEBS" onclick="selZone('CEBS')"><span class="z-btn-icon">📘</span><span style="font-size:11px; font-weight:600">CEBS</span></div>
      <div class="z-btn" id="zb-CEJ" onclick="selZone('CEJ')"><span class="z-btn-icon">📗</span><span style="font-size:11px; font-weight:600">CEJ</span></div>
      <div class="z-btn" id="zb-AEBB" onclick="selZone('AEBB')"><span class="z-btn-icon">📙</span><span style="font-size:11px; font-weight:600">AEBB</span></div>
    </div>

    <div class="z-btn" id="zb-ADMIN" onclick="selZone('ADMIN')" style="width:100%; margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:10px">
        <span>👑</span><span style="font-size:11px; font-weight:600">ACCÈS ADMINISTRATEUR</span>
    </div>

    <div style="margin-bottom:15px">
      <label style="font-family:'JetBrains Mono'; font-size:10px; color:var(--tx3); text-transform:uppercase">Code d'accès</label>
      <input type="password" id="passInput" style="width:100%; padding:12px; border-radius:var(--r); border:1px solid var(--bd); background:var(--s2); color:var(--tx); margin-top:5px" placeholder="••••••••">
    </div>
    
    <button class="btn btn-primary" style="width:100%; justify-content:center; padding:14px" onclick="attemptLogin()">Se connecter</button>
    <div id="loginErr" style="color:var(--red); font-size:12px; margin-top:10px; display:none; text-align:center">Code incorrect ou zone non sélectionnée</div>
  </div>
</div>

<!-- APP CONTENT -->
<div id="app" style="display:none">
  <header>
    <div style="display:flex; align-items:center; gap:15px">
      <div style="font-weight:700; font-size:18px">DRRO <span style="color:var(--acc)">2026</span></div>
      <div id="zoneBadge" style="padding:4px 10px; border-radius:6px; font-family:'JetBrains Mono'; font-size:10px; font-weight:700"></div>
    </div>
    <div style="display:flex; align-items:center; gap:12px">
      <div class="theme-toggle" onclick="toggleTheme()" title="Mode Sombre">🌓</div>
      <button class="btn" onclick="window.print()">Print Report</button>
      <button class="btn btn-logout" onclick="logout()" style="color:var(--red)">Déconnexion</button>
    </div>
  </header>

  <nav class="nav-bar">
    <button class="tab on" onclick="showTab('ov', this)">Analyse</button>
    <button class="tab" onclick="showTab('db', this)">Base de données</button>
  </nav>

  <main>
    <!-- PANEL: OVERVIEW -->
    <div id="p-ov" class="panel on">
      <div class="kpi-grid">
        <div class="kpi-card" style="--c:var(--acc)">
          <div class="kpi-label">Total Articles</div>
          <div class="kpi-val" id="k-total">0</div>
        </div>
        <div class="kpi-card" style="--c:var(--acc3)">
          <div class="kpi-label">Conformes</div>
          <div class="kpi-val" id="k-ok">0</div>
        </div>
        <div class="kpi-card" style="--c:var(--amber)">
          <div class="kpi-label">À vérifier</div>
          <div class="kpi-val" id="k-av">0</div>
        </div>
        <div class="kpi-card" style="--c:var(--red)">
          <div class="kpi-label">Discordances</div>
          <div class="kpi-val" id="k-disc">0</div>
        </div>
      </div>

      <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px; margin-bottom:24px">
        <div class="kpi-card" style="min-height:400px">
          <div class="kpi-label">Observations par Gare</div>
          <canvas id="chartGares"></canvas>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Répartition Globale</div>
          <canvas id="chartPie"></canvas>
        </div>
      </div>
    </div>

    <!-- PANEL: DATABASE -->
    <div id="p-db" class="panel">
      <div class="table-container">
        <div class="table-header">
          <div style="display:flex; gap:10px; align-items:center">
            <input type="text" id="mainSearch" placeholder="Rechercher..." oninput="filterData()" style="padding:8px 12px; border-radius:var(--r); border:1px solid var(--bd); background:var(--s2); color:var(--tx); width:250px">
            <select id="filterObs" onchange="filterData()" style="padding:8px; border-radius:var(--r); border:1px solid var(--bd); background:var(--s2); color:var(--tx)">
                <option value="">Toutes les observations</option>
                <option value="CONFORME">Conforme</option>
                <option value="A VERIFIER">A vérifier</option>
                <option value="DISCORDANCE">Discordance</option>
            </select>
          </div>
          <div id="rowCount" style="font-family:'JetBrains Mono'; font-size:12px; color:var(--tx3)">0 lignes</div>
        </div>
        <div style="overflow-x:auto">
          <table id="dataTable">
            <thead>
              <tr id="tableHead"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
/**
 * CONFIGURATION & SECURITÉ
 * Les mots de passe sont stockés sous forme de hash SHA-256
 */
const CONFIG = {
  zones: {
    CEBS: { 
        hash: "67858c8942a00c73204d1668e1467406a09040330663f7071d09e5ee50702f23", // cebs2026
        id: "1H1BKz-DMz5dKVY1G1fQ_pAf_IQS99EBq", color: "#1e40af" 
    },
    CEJ: { 
        hash: "19e2730129207e3240e87d1976a267924467d01869e54a3765e90d79435b8005", // cej2026
        id: "1G-TJ1MVf0pA2bnQbMdppSt8HiczPlOgG", color: "#7c3aed" 
    },
    AEBB: { 
        hash: "830a6538b3297a7e1708f51a441315570077c578051772648792015f6244f762", // aebb2026
        id: "1ORIJXPdWMeADALzeElDvxUl_Fqy3Nfwv", color: "#059669" 
    },
    ADMIN: { 
        hash: "46686178e69d0d33b478332f1704207f2402264906f2d216f2f2162602720d2d", // drro@admin2026
        color: "#f59e0b" 
    }
  }
};

let STATE = {
  activeZone: null,
  rawData: [],
  filteredData: [],
  charts: {}
};

// --- AUTHENTIFICATION ---

function selZone(z) {
    STATE.activeZone = z;
    document.querySelectorAll('.z-btn').forEach(b => b.classList.remove('sel'));
    document.getElementById('zb-' + z).classList.add('sel');
}

async function attemptLogin() {
    const input = document.getElementById('passInput').value;
    const err = document.getElementById('loginErr');
    
    if (!STATE.activeZone || !input) {
        err.style.display = "block";
        return;
    }

    const hashedInput = CryptoJS.SHA256(input).toString();
    
    if (hashedInput === CONFIG.zones[STATE.activeZone].hash) {
        // Succès
        localStorage.setItem('drro_session', JSON.stringify({
            zone: STATE.activeZone,
            expiry: new Date().getTime() + (8 * 60 * 60 * 1000) // 8 heures
        }));
        initApp();
    } else {
        err.style.display = "block";
        document.getElementById('passInput').value = "";
    }
}

function checkSession() {
    const session = JSON.parse(localStorage.getItem('drro_session'));
    if (session && new Date().getTime() < session.expiry) {
        STATE.activeZone = session.zone;
        initApp();
    }
}

function logout() {
    localStorage.removeItem('drro_session');
    location.reload();
}

// --- INITIALISATION & CHARGEMENT ---

async function initApp() {
    document.getElementById('loginScreen').style.display = "none";
    document.getElementById('loader').style.display = "flex";
    document.getElementById('app').style.display = "block";
    
    const badge = document.getElementById('zoneBadge');
    badge.textContent = STATE.activeZone;
    badge.style.background = CONFIG.zones[STATE.activeZone].color;
    badge.style.color = "#fff";

    await loadAllData();
    renderCharts();
    updateDashboard();
    filterData();
    
    document.getElementById('loader').style.display = "none";
}

async function loadAllData() {
    const bar = document.getElementById('loadBar');
    const msg = document.getElementById('loadMsg');
    
    let zonesToLoad = STATE.activeZone === 'ADMIN' ? ['CEBS', 'CEJ', 'AEBB'] : [STATE.activeZone];
    let combined = [];

    for (let i = 0; i < zonesToLoad.length; i++) {
        const z = zonesToLoad[i];
        msg.textContent = `Chargement ${z}...`;
        bar.style.width = ((i / zonesToLoad.length) * 100) + "%";
        
        try {
            const url = `https://docs.google.com/spreadsheets/d/${CONFIG.zones[z].id}/export?format=xlsx`;
            const resp = await fetch(url);
            const arrayBuffer = await resp.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            
            combined = combined.concat(json.map(row => ({ ...row, __zone: z })));
        } catch (e) {
            console.error("Erreur zone " + z, e);
        }
    }
    
    STATE.rawData = combined;
    STATE.filteredData = combined;
    bar.style.width = "100%";
}

// --- LOGIQUE DASHBOARD ---

function updateDashboard() {
    const data = STATE.rawData;
    document.getElementById('k-total').textContent = data.length.toLocaleString();
    
    const ok = data.filter(r => String(r.Observation).includes("CONFORME")).length;
    const av = data.filter(r => String(r.Observation).includes("A VERIFIER")).length;
    const disc = data.filter(r => String(r.Observation).includes("DISCORDANCE")).length;
    
    document.getElementById('k-ok').textContent = ok.toLocaleString();
    document.getElementById('k-av').textContent = av.toLocaleString();
    document.getElementById('k-disc').textContent = disc.toLocaleString();
}

function renderCharts() {
    const ctxPie = document.getElementById('chartPie').getContext('2d');
    const data = STATE.rawData;
    
    const stats = {
        ok: data.filter(r => String(r.Observation).includes("CONFORME")).length,
        av: data.filter(r => String(r.Observation).includes("A VERIFIER")).length,
        disc: data.filter(r => String(r.Observation).includes("DISCORDANCE")).length,
        nd: 0
    };
    stats.nd = data.length - (stats.ok + stats.av + stats.disc);

    if(STATE.charts.pie) STATE.charts.pie.destroy();
    STATE.charts.pie = new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: ['Conforme', 'À vérifier', 'Discordance', 'N.R'],
            datasets: [{
                data: [stats.ok, stats.av, stats.disc, stats.nd],
                backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#94a3b8'],
                borderWidth: 0
            }]
        },
        options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
    });

    // Chart Gares (Top 10)
    const ctxBar = document.getElementById('chartGares').getContext('2d');
    const gares = {};
    data.forEach(r => {
        const g = r.Gare || "Inconnue";
        if(!gares[g]) gares[g] = 0;
        gares[g]++;
    });
    
    const sortedGares = Object.entries(gares).sort((a,b) => b[1]-a[1]).slice(0,10);

    if(STATE.charts.bar) STATE.charts.bar.destroy();
    STATE.charts.bar = new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: sortedGares.map(x => "Gare " + x[0]),
            datasets: [{
                label: 'Articles',
                data: sortedGares.map(x => x[1]),
                backgroundColor: CONFIG.zones[STATE.activeZone === 'ADMIN' ? 'CEBS' : STATE.activeZone].color,
                borderRadius: 5
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

// --- TABLEAU & FILTRES ---

function filterData() {
    const query = document.getElementById('mainSearch').value.toLowerCase();
    const obsFilter = document.getElementById('filterObs').value;
    
    STATE.filteredData = STATE.rawData.filter(r => {
        const matchSearch = Object.values(r).some(v => String(v).toLowerCase().includes(query));
        const matchObs = !obsFilter || String(r.Observation).includes(obsFilter);
        return matchSearch && matchObs;
    });
    
    document.getElementById('rowCount').textContent = `${STATE.filteredData.length} articles trouvés`;
    renderTable();
}

function renderTable() {
    const head = document.getElementById('tableHead');
    const body = document.getElementById('tableBody');
    const data = STATE.filteredData.slice(0, 100); // Limite à 100 pour performance

    if (data.length > 0) {
        const cols = ['ID_Immobilisation', 'Lib_Article', 'Cod_Article', 'Observation', 'Gare', 'Inventoriste'];
        head.innerHTML = cols.map(c => `<th>${c.replace('_',' ')}</th>`).join('');
        
        body.innerHTML = data.map(r => `
            <tr>
                <td style="font-family:monospace; font-weight:600">${r.ID_Immobilisation || '-'}</td>
                <td>${r.Lib_Article || '-'}</td>
                <td>${r.Cod_Article || '-'}</td>
                <td><span style="padding:4px 8px; border-radius:4px; font-size:10px; font-weight:700; background:${getObsColor(r.Observation)}20; color:${getObsColor(r.Observation)}">${r.Observation || 'N/R'}</span></td>
                <td>${r.Gare || '-'}</td>
                <td>${r.Inventoriste || '-'}</td>
            </tr>
        `).join('');
    } else {
        body.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px">Aucun résultat trouvé</td></tr>`;
    }
}

function getObsColor(obs) {
    if(!obs) return '#94a3b8';
    if(obs.includes("CONFORME")) return '#10b981';
    if(obs.includes("A VERIFIER")) return '#f59e0b';
    if(obs.includes("DISCORDANCE")) return '#ef4444';
    return '#94a3b8';
}

// --- UI HELPERS ---

function showTab(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.getElementById('p-' + id).classList.add('on');
    btn.classList.add('on');
}

function toggleTheme() {
    document.body.classList.toggle('dark-theme');
    localStorage.setItem('drro_theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
}

// Au chargement
window.onload = () => {
    if(localStorage.getItem('drro_theme') === 'dark') document.body.classList.add('dark-theme');
    checkSession();
};

</script>
</body>
</html>
