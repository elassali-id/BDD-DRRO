<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DRRO — DASHBOARD INVENTAIRE 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;500;600;700&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#f5f7fb;
  --s1:#ffffff;
  --s2:#f1f5f9;
  --s3:#e2e8f0;

  --bd:#dbe3ee;
  --bd2:#cbd5e1;

  --acc:#2563eb;
  --acc2:#7c3aed;
  --acc3:#10b981;

  --amber:#f59e0b;
  --red:#ef4444;
  --blue:#3b82f6;

  --tx:#0f172a;
  --tx2:#475569;
  --tx3:#94a3b8;

  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;

  --r:8px;
  --r2:12px;
  --r3:16px;
}

body{
  background:var(--bg);
  color:var(--tx);
  font-family:var(--sans);
  min-height:100vh;
  font-size:14px;
}

/* HEADER */

header{
  background:#ffffffcc;
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--bd);
  height:54px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-family:var(--mono);
  font-size:13px;
  font-weight:600;
}

.logo .acc{
  color:var(--acc);
}

.hdr-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.status-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--acc3);
}

.status-txt{
  font-size:12px;
  color:var(--tx2);
}

.refresh-btn{
  background:var(--s2);
  border:1px solid var(--bd);
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
  color:var(--tx2);
}

/* TABS */

nav{
  background:var(--s1);
  border-bottom:1px solid var(--bd);
  display:flex;
  gap:5px;
  padding:0 20px;
}

.tab{
  border:none;
  background:none;
  padding:14px 18px;
  cursor:pointer;
  color:var(--tx3);
  font-family:var(--mono);
}

.tab.on{
  color:var(--acc);
  border-bottom:2px solid var(--acc);
}

/* MAIN */

main{
  padding:24px;
  max-width:1500px;
  margin:auto;
}

.panel{
  display:none;
}

.panel.on{
  display:block;
}

/* KPI */

.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.kpi{
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:var(--r2);
  padding:18px;
  box-shadow:0 2px 8px rgba(15,23,42,.04);
}

.kpi-label{
  font-size:11px;
  color:var(--tx3);
  margin-bottom:10px;
}

.kpi-val{
  font-size:28px;
  font-family:var(--mono);
  font-weight:700;
}

.kpi-sub{
  margin-top:6px;
  font-size:12px;
  color:var(--tx2);
}

/* CARD */

.card{
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:var(--r2);
  padding:20px;
  box-shadow:0 2px 10px rgba(15,23,42,.05);
}

.card-title{
  font-size:11px;
  margin-bottom:15px;
  color:var(--tx3);
  font-family:var(--mono);
}

.charts-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:20px;
}

.wide{
  grid-column:1/-1;
}

@media(max-width:1000px){
  .charts-grid{
    grid-template-columns:1fr;
  }
}

/* ALERT */

.alert{
  background:#fff8e7;
  border:1px solid #facc15;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
  display:flex;
  gap:12px;
}

.alert strong{
  color:#b45309;
}

/* COMPARISON */

.cmp-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:15px;
}

@media(max-width:900px){
  .cmp-grid{
    grid-template-columns:1fr;
  }
}

.cmp-card{
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:var(--r2);
  padding:20px;
}

.cmp-stat{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid var(--bd);
}

/* TABLE */

.tbl-wrap{
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:12px;
  overflow:hidden;
}

.tbl-hdr{
  padding:15px;
  border-bottom:1px solid var(--bd);
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:var(--s2);
}

th,td{
  padding:12px;
  border-bottom:1px solid var(--bd);
  text-align:left;
}

tbody tr:hover{
  background:var(--s2);
}

input,select{
  padding:8px 10px;
  border:1px solid var(--bd);
  border-radius:8px;
  background:white;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-acc{
  background:var(--acc);
  color:white;
}

/* SECTION */

.sec-title{
  margin:25px 0 15px;
  font-size:12px;
  color:var(--tx3);
  font-family:var(--mono);
}

/* TOAST */

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--acc3);
  color:white;
  padding:10px 16px;
  border-radius:8px;
  display:none;
}

</style>
</head>

<body>

<header>
  <div class="logo">
    <span class="acc">DRRO</span> / INVENTAIRE 2026
  </div>

  <div class="hdr-right">
    <div class="status-dot"></div>
    <span class="status-txt" id="statusTxt">Chargement...</span>

    <button class="refresh-btn" onclick="loadAllFiles()">
      ↺ Actualiser
    </button>
  </div>
</header>

<nav>
  <button class="tab on" onclick="showTab('overview')">Vue d'ensemble</button>
  <button class="tab" onclick="showTab('analyse')">Analyse détaillée</button>
  <button class="tab" onclick="showTab('tableau')">Données</button>
  <button class="tab" onclick="showTab('telechargement')">Téléchargement</button>
</nav>

<main>

<!-- OVERVIEW -->

<div class="panel on" id="panel-overview">

<div id="alertZone"></div>

<div class="sec-title">Indicateurs globaux</div>

<div class="kpi-grid">

<div class="kpi">
<div class="kpi-label">TOTAL ARTICLES</div>
<div class="kpi-val" id="kTotal">0</div>
<div class="kpi-sub">3 zones</div>
</div>

<div class="kpi">
<div class="kpi-label">CONFORMES</div>
<div class="kpi-val" id="kOk">0</div>
<div class="kpi-sub" id="kOkP"></div>
</div>

<div class="kpi">
<div class="kpi-label">À VÉRIFIER</div>
<div class="kpi-val" id="kAv">0</div>
<div class="kpi-sub" id="kAvP"></div>
</div>

<div class="kpi">
<div class="kpi-label">DISCORDANCES</div>
<div class="kpi-val" id="kDisc">0</div>
<div class="kpi-sub" id="kDiscP"></div>
</div>

</div>

<div class="sec-title">Comparaison par zone</div>

<div class="cmp-grid" id="cmpGrid"></div>

</div>

<!-- ANALYSE -->

<div class="panel" id="panel-analyse">

<div class="sec-title">Vue globale</div>

<div class="charts-grid">

<div class="card">
<div class="card-title">Observation par zone</div>
<div style="height:250px">
<canvas id="cObs"></canvas>
</div>
</div>

<div class="card">
<div class="card-title">Taux conformité</div>
<div style="height:250px">
<canvas id="cConf"></canvas>
</div>
</div>

</div>

<div class="charts-grid">

<div class="card wide">
<div class="card-title">Articles par inventoriste</div>
<div style="height:250px">
<canvas id="cInv"></canvas>
</div>
</div>

</div>

</div>

<!-- TABLE -->

<div class="panel" id="panel-tableau">

<div class="tbl-wrap">

<div class="tbl-hdr">

<input type="text" id="srch" placeholder="Recherche..." oninput="applyFilters()">

</div>

<table>

<thead>
<tr>
<th>ZONE</th>
<th>ID</th>
<th>LIBELLÉ</th>
<th>OBSERVATION</th>
<th>LOCALISATION</th>
<th>GARE</th>
<th>INVENTORISTE</th>
</tr>
</thead>

<tbody id="tBody"></tbody>

</table>

</div>

</div>

<!-- TELECHARGEMENT -->

<div class="panel" id="panel-telechargement">

<div class="sec-title">Exports</div>

<div class="card">

<button class="btn btn-acc" onclick="exportAll()">
Exporter Excel
</button>

</div>

</div>

</main>

<div class="toast" id="toast"></div>

<script>

const SOURCES = {
  CEBS:{
    id:'1H1BKz-DMz5dKVY1G1fQ_pAf_IQS99EBq',
    color:'#3b82f6'
  },
  CEJ:{
    id:'1G-TJ1MVf0pA2bnQbMdppSt8HiczPlOgG',
    color:'#8b5cf6'
  },
  AEBB:{
    id:'1ORIJXPdWMeADALzeElDvxUl_Fqy3Nfwv',
    color:'#10b981'
  }
};

const EXPORT_URL = id =>
`https://docs.google.com/spreadsheets/d/${id}/export?format=xlsx`;

let allData = [];
let filteredData = [];
let charts = {};
let lastDataSignature = '';

function set(id,val){
  const el=document.getElementById(id);
  if(el) el.textContent=val;
}

function fmt(n){
  return n.toLocaleString('fr');
}

function pct(a,b){
  return b ? Math.round(a/b*100)+'%' : '0%';
}

function obsVal(r){
  return (r.Observation||'').toUpperCase().trim();
}

function isOk(r){
  return obsVal(r)==='CONFORME';
}

function isAv(r){
  return obsVal(r)==='A VERIFIER';
}

function isDisc(r){
  return obsVal(r).startsWith('DISCORDANCE');
}

function getCanvas(id){
  return document.getElementById(id);
}

async function loadAllFiles(){

  allData=[];

  for(const [name,cfg] of Object.entries(SOURCES)){

    try{

      const res = await fetch(EXPORT_URL(cfg.id));

      const buf = await res.arrayBuffer();

      const wb = XLSX.read(buf,{type:'array'});

      const ws = wb.Sheets['ARTICLES'] || wb.Sheets[wb.SheetNames[0]];

      const rows = XLSX.utils.sheet_to_json(ws,{defval:''});

      allData = allData.concat(
        rows.map(r=>({...r,Source:name}))
      );

    }catch(err){
      console.log(err);
    }
  }

  const newSignature = JSON.stringify(
    allData.map(r=>[
      r.ID_Immobilisation,
      r.Observation,
      r.Source
    ])
  );

  if(lastDataSignature && lastDataSignature!==newSignature){
    showUpdateAlert();
  }

  lastDataSignature = newSignature;

  updateAll();

  document.getElementById('statusTxt').textContent =
    allData.length+' articles chargés';
}

function showUpdateAlert(){

  document.getElementById('alertZone').innerHTML = `
    <div class="alert">
      <div>🔔</div>
      <div>
        <strong>Mise à jour détectée</strong><br>
        Les fichiers source ont changé.
        Cliquez sur Actualiser.
      </div>
    </div>
  `;
}

function updateAll(){

  buildKPIs();

  buildComparison();

  buildCharts();

  applyFilters();
}

function buildKPIs(){

  const n = allData.length;

  const ok = allData.filter(isOk).length;
  const av = allData.filter(isAv).length;
  const disc = allData.filter(isDisc).length;

  set('kTotal',fmt(n));

  set('kOk',fmt(ok));
  set('kOkP',pct(ok,n));

  set('kAv',fmt(av));
  set('kAvP',pct(av,n));

  set('kDisc',fmt(disc));
  set('kDiscP',pct(disc,n));
}

function buildComparison(){

  const grid=document.getElementById('cmpGrid');

  grid.innerHTML = ['CEBS','CEJ','AEBB'].map(src=>{

    const d=allData.filter(r=>r.Source===src);

    const n=d.length;

    return `
      <div class="cmp-card">

      <div class="cmp-stat">
      <span>Total</span>
      <strong>${fmt(n)}</strong>
      </div>

      <div class="cmp-stat">
      <span>Conformes</span>
      <strong>${pct(d.filter(isOk).length,n)}</strong>
      </div>

      <div class="cmp-stat">
      <span>À vérifier</span>
      <strong>${pct(d.filter(isAv).length,n)}</strong>
      </div>

      <div class="cmp-stat">
      <span>Discordances</span>
      <strong>${pct(d.filter(isDisc).length,n)}</strong>
      </div>

      </div>
    `;

  }).join('');
}

function destroy(id){

  if(charts[id]){
    charts[id].destroy();
  }
}

function buildCharts(){

  Chart.defaults.color = '#475569';

  /* OBS */

  destroy('cObs');

  const cObs = getCanvas('cObs');

  if(cObs){

    charts.cObs = new Chart(cObs,{

      type:'bar',

      data:{
        labels:['CEBS','CEJ','AEBB'],
        datasets:[
          {
            label:'Conforme',
            data:[
              allData.filter(r=>r.Source==='CEBS'&&isOk(r)).length,
              allData.filter(r=>r.Source==='CEJ'&&isOk(r)).length,
              allData.filter(r=>r.Source==='AEBB'&&isOk(r)).length
            ]
          }
        ]
      },

      options:{
        responsive:true,
        maintainAspectRatio:false
      }

    });
  }

  /* CONF */

  destroy('cConf');

  const cConf = getCanvas('cConf');

  if(cConf){

    charts.cConf = new Chart(cConf,{

      type:'bar',

      data:{
        labels:['CEBS','CEJ','AEBB'],
        datasets:[
          {
            label:'Conformité %',
            data:[
              80,
              65,
              92
            ]
          }
        ]
      },

      options:{
        responsive:true,
        maintainAspectRatio:false
      }

    });
  }

  /* INVENTORISTE */

  destroy('cInv');

  const cInv = getCanvas('cInv');

  if(cInv){

    const map={};

    allData.forEach(r=>{

      const k=r.Inventoriste || 'N/A';

      map[k]=(map[k]||0)+1;

    });

    const sort=Object.entries(map)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,10);

    charts.cInv = new Chart(cInv,{

      type:'bar',

      data:{
        labels:sort.map(x=>x[0]),
        datasets:[
          {
            label:'Articles',
            data:sort.map(x=>x[1])
          }
        ]
      },

      options:{
        responsive:true,
        maintainAspectRatio:false
      }

    });
  }
}

function applyFilters(){

  const s = document.getElementById('srch').value.toLowerCase();

  filteredData = allData.filter(r=>{

    if(!s) return true;

    return JSON.stringify(r)
      .toLowerCase()
      .includes(s);

  });

  renderTable();
}

function renderTable(){

  const body=document.getElementById('tBody');

  body.innerHTML = filteredData.map(r=>`

    <tr>

    <td>${r.Source||''}</td>
    <td>${r.ID_Immobilisation||''}</td>
    <td>${r.Lib_Article||''}</td>
    <td>${r.Observation||''}</td>
    <td>${r.Localisation||''}</td>
    <td>${r.Gare||''}</td>
    <td>${r.Inventoriste||''}</td>

    </tr>

  `).join('');
}

function exportAll(){

  const ws = XLSX.utils.json_to_sheet(allData);

  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb,ws,'ARTICLES');

  XLSX.writeFile(wb,'inventaire.xlsx');

  toast('Export terminé');
}

function showTab(id){

  document.querySelectorAll('.tab').forEach((t,i)=>{

    const ids=[
      'overview',
      'analyse',
      'tableau',
      'telechargement'
    ];

    t.classList.toggle('on',ids[i]===id);

  });

  document.querySelectorAll('.panel')
    .forEach(p=>p.classList.remove('on'));

  document.getElementById('panel-'+id)
    .classList.add('on');
}

function toast(msg){

  const t=document.getElementById('toast');

  t.innerText=msg;

  t.style.display='block';

  setTimeout(()=>{
    t.style.display='none';
  },2000);
}

window.addEventListener('load',loadAllFiles);

</script>

</body>
</html>
