<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRRO — MONITORING INVENTAIRE 2026</title>
<!-- Bibliothèques Natives et Fiables -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;500;600;700&display=swap');

:root {
  --bg: #f8fafc; --s1: #ffffff; --s2: #f1f5f9; --s3: #e2e8f0;
  --bd: #e2e8f0; --bd2: #cbd5e1;
  --acc: #6c47e8; --acc-hover: #5a38cc;
  --tx: #0f172a; --tx2: #475569; --tx3: #94a3b8;
  --acc3: #10b981; --amber: #f59e0b; --red: #ef4444;
  --gold: #c8951a; --r: 8px; --r2: 12px; --r3: 20px;
}

body.dark-theme {
  --bg: #0f172a; --s1: #1e293b; --s2: #334155; --s3: #475569;
  --bd: #334155; --bd2: #475569;
  --tx: #f8fafc; --tx2: #cbd5e1; --tx3: #64748b;
  --acc: #8b5cf6;
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, color 0.1s; }
body { background: var(--bg); color: var(--tx); font-family: 'Syne', sans-serif; font-size: 14px; min-height: 100vh; }

/* ── LOGIN ── */
#loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
.login-box { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--r3); padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
.zone-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
.z-btn { border: 2px solid var(--bd); border-radius: var(--r2); padding: 15px 5px; cursor: pointer; text-align: center; background: var(--s1); transition: 0.2s; }
.z-btn.sel { border-color: var(--acc); background: rgba(108, 71, 232, 0.08); }
.z-btn-icon { font-size: 22px; display: block; margin-bottom: 5px; }

.admin-zone { border: 2px solid #f5cc72; background: #fffbea; color: #854f0b; width: 100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: var(--r2); cursor: pointer; }
.admin-zone.sel { border-color: var(--gold); background: #fff5cc; }

/* ── APP ── */
header { height: 64px; background: var(--s1); border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
.nav-bar { background: var(--s1); border-bottom: 1px solid var(--bd); padding: 0 24px; display: flex; gap: 10px; }
.tab { padding: 15px 20px; font-family: 'JetBrains Mono'; font-size: 12px; cursor: pointer; border: none; background: none; color: var(--tx3); font-weight: 600; border-bottom: 2px solid transparent; }
.tab.on { color: var(--acc); border-bottom-color: var(--acc); }

main { padding: 24px; max-width: 1400px; margin: 0 auto; }
.panel { display: none; } .panel.on { display: block; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--s1); border: 1px solid var(--bd); padding: 20px; border-radius: var(--r2); position: relative; }
.kpi-card::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 4px; background: var(--c); border-radius: 0 4px 4px 0; }
.kpi-val { font-size: 28px; font-weight: 700; margin: 5px 0; font-family: 'JetBrains Mono'; }

.btn { padding: 10px 20px; border-radius: var(--r); font-family: 'JetBrains Mono'; font-size: 12px; cursor: pointer; border: none; background: var(--acc); color: white; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.btn:hover { background: var(--acc-hover); }

/* ── TABLE ── */
.table-container { background: var(--s1); border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
th { background: var(--s2); padding: 12px; text-align: left; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--tx3); text-transform: uppercase; border-bottom: 1px solid var(--bd); }
td { padding: 12px; border-bottom: 1px solid var(--bd); font-size: 13px; color: var(--tx2); }
tr:hover td { background: rgba(0,0,0,0.02); }

@media print { header, .nav-bar, .btn { display:none !important } }
</style>
</head>
<body class="dark-theme">

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="text-align:center; margin-bottom:20px">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMjAgOTAiPgogIDx0ZXh0IHg9IjE2MCIgeT0iMzQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJzZXJpZiIgZm9udC1zaXplPSIyMiIgZm9udC13ZWlnaHQ9IjcwMCIgZmlsbD0iIzFhMmY2ZSI+2KfZhNfYsdmCINin2YTYs9mK2KfYsdipPC90ZXh0PgogIDxsaW5lIHgxPSI2MCIgeTE9IjQ1IiB4Mj0iMjYwIiB5Mj0iNDUiIHN0cm9rZT0iIzFhMmY2ZSIgc3Ryb2tlLXdpZHRoPSIwLjgiLz4KICA8dGV4dCB4PSIxNjAiIHk9IjY4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0ic2VyaWYiIGZvbnQtc2l6ZT0iMTciIGZvbnQtd2VpZ2h0PSI2MDAiIGZpbGw9IzFhMmY2ZT5BdXRvcm91dGVzIGR1IE1hcm9jPC90ZXh0Pgo8L3N2Zz4=" style="height:60px; margin-bottom:10px">
        <div style="font-family:'JetBrains Mono'; font-size:11px; font-weight:600; color:var(--tx3)">DRRO / INVENTAIRE 2026</div>
    </div>
    
    <div class="zone-grid">
      <div class="z-btn" id="zb-CEBS" onclick="selZone('CEBS')"><span class="z-btn-icon">📘</span><span style="font-size:11px; font-weight:600">CEBS</span></div>
      <div class="z-btn" id="zb-CEJ" onclick="selZone('CEJ')"><span class="z-btn-icon">📗</span><span style="font-size:11px; font-weight:600">CEJ</span></div>
      <div class="z-btn" id="zb-AEBB" onclick="selZone('AEBB')"><span class="z-btn-icon">📙</span><span style="font-size:11px; font-weight:600">AEBB</span></div>
    </div>

    <div class="admin-zone" id="zb-ADMIN" onclick="selZone('ADMIN')">
        <span>👑</span><span style="font-size:11px; font-weight:700">ACCÈS ADMINISTRATEUR</span>
    </div>

    <div style="margin-bottom:15px">
      <label style="font-family:'JetBrains Mono'; font-size:10px; color:var(--tx3); text-transform:uppercase">Code d'accès</label>
      <input type="password" id="passInput" onkeydown="if(event.key==='Enter')attemptLogin()" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--bd); background:var(--s2); color:var(--tx); margin-top:5px; outline:none" placeholder="••••••••">
    </div>
    
    <button class="btn" style="width:100%; justify-content:center; padding:14px; font-weight:700" onclick="attemptLogin()">Se connecter →</button>
    <div id="loginErr" style="color:var(--red); font-size:12px; margin-top:15px; display:none; text-align:center; font-family:'JetBrains Mono'">Code incorrect.</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div style="display:flex; align-items:center; gap:15px">
      <div style="font-weight:700; font-size:18px">DRRO <span style="color:var(--acc)">2026</span></div>
      <div id="zoneBadge" style="padding:4px 10px; border-radius:6px; color:white; font-family:'JetBrains Mono'; font-size:10px; font-weight:700"></div>
    </div>
    <div style="display:flex; align-items:center; gap:12px">
      <div onclick="toggleTheme()" style="cursor:pointer; font-size:20px">🌓</div>
      <button class="btn" onclick="window.print()" style="padding:6px 12px">🖨️ PDF</button>
      <button class="btn" onclick="logout()" style="padding:6px 12px; background:var(--red)">Quitter</button>
    </div>
  </header>

  <nav class="nav-bar">
    <button class="tab on" onclick="showTab('ov', this)">Analyse</button>
    <button class="tab" onclick="showTab('db', this)">Base de données</button>
  </nav>

  <main>
    <div id="p-ov" class="panel on">
      <div class="kpi-grid" id="kpiContainer"></div>
      <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px">
        <div class="kpi-card" style="min-height:350px"><canvas id="chartBar"></canvas></div>
        <div class="kpi-card"><canvas id="chartPie"></canvas></div>
      </div>
    </div>

    <div id="p-db" class="panel">
        <div class="table-container">
            <div style="padding:15px; border-bottom:1px solid var(--bd)">
                <input type="text" id="search" placeholder="🔍 Rechercher ID, Article, Gare..." oninput="filterData()" style="padding:10px; width:100%; border-radius:8px; border:1px solid var(--bd); outline:none; background:var(--s2); color:var(--tx)">
            </div>
            <div style="overflow-x:auto">
                <table>
                    <thead><tr id="tHead"></tr></thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
        </div>
    </div>
  </main>
</div>

<script>
/** 
 * CONFIGURATION SECURISEE SANS BIBLIOTHEQUE EXTERNE (BASE64)
 * Les codes : cebs2026, cej2026, aebb2026, drro@admin2026
 */
const CONFIG = {
  zones: {
    CEBS: { pass: "Y2ViczIwMjY=", id: "1H1BKz-DMz5dKVY1G1fQ_pAf_IQS99EBq", color: "#1a4fa8" },
    CEJ:  { pass: "Y2VqMjAyNg==", id: "1G-TJ1MVf0pA2bnQbMdppSt8HiczPlOgG", color: "#5b3dc4" },
    AEBB: { pass: "YWViYjIwMjY=", id: "1ORIJXPdWMeADALzeElDvxUl_Fqy3Nfwv", color: "#1d9e75" },
    ADMIN:{ pass: "ZHJyb0BhZG1pbjIwMjY=", color: "#c8951a" }
  }
};

let STATE = { activeZone: null, rawData: [], filteredData: [], charts: {} };

function selZone(z) {
    STATE.activeZone = z;
    document.querySelectorAll('.z-btn, .admin-zone').forEach(b => b.classList.remove('sel'));
    const btn = document.getElementById('zb-' + z);
    if(btn) btn.classList.add('sel');
    document.getElementById('loginErr').style.display = "none";
}

function attemptLogin() {
    const input = document.getElementById('passInput').value.trim();
    const err = document.getElementById('loginErr');
    
    if (!STATE.activeZone) {
        err.textContent = "Sélectionnez une zone."; err.style.display = "block"; return;
    }

    // Encodage Base64 natif pour la comparaison (Fonctionne partout)
    const encodedInput = btoa(input);
    
    if (encodedInput === CONFIG.zones[STATE.activeZone].pass) {
        localStorage.setItem('drro_session', JSON.stringify({
            zone: STATE.activeZone,
            expiry: new Date().getTime() + (8 * 60 * 60 * 1000)
        }));
        initApp();
    } else {
        err.style.display = "block";
        document.getElementById('passInput').value = "";
    }
}

async function initApp() {
    document.getElementById('loginScreen').style.display = "none";
    document.getElementById('app').style.display = "block";
    
    const badge = document.getElementById('zoneBadge');
    badge.textContent = STATE.activeZone;
    badge.style.background = CONFIG.zones[STATE.activeZone].color;

    const zones = STATE.activeZone === 'ADMIN' ? ['CEBS', 'CEJ', 'AEBB'] : [STATE.activeZone];
    let combined = [];

    for (let z of zones) {
        try {
            const resp = await fetch(`https://docs.google.com/spreadsheets/d/${CONFIG.zones[z].id}/export?format=xlsx`);
            const buf = await resp.arrayBuffer();
            const wb = XLSX.read(buf);
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            combined = combined.concat(json.map(r => ({ ...r, _z: z })));
        } catch (e) { console.error(e); }
    }
    
    STATE.rawData = combined;
    updateDashboard();
}

function updateDashboard() {
    const d = STATE.rawData;
    const ok = d.filter(r => String(r.Observation).toUpperCase().includes("CONFORME")).length;
    const av = d.filter(r => String(r.Observation).toUpperCase().includes("A VERIFIER")).length;
    const disc = d.filter(r => String(r.Observation).toUpperCase().includes("DISCORDANCE")).length;

    document.getElementById('kpiContainer').innerHTML = `
        <div class="kpi-card" style="--c:var(--acc)"><div style="font-size:10px">ARTICLES</div><div class="kpi-val">${d.length.toLocaleString()}</div></div>
        <div class="kpi-card" style="--c:var(--acc3)"><div style="font-size:10px">CONFORMES</div><div class="kpi-val">${ok.toLocaleString()}</div></div>
        <div class="kpi-card" style="--c:var(--amber)"><div style="font-size:10px">À VÉRIFIER</div><div class="kpi-val">${av.toLocaleString()}</div></div>
        <div class="kpi-card" style="--c:var(--red)"><div style="font-size:10px">DISCORDANCES</div><div class="kpi-val">${disc.toLocaleString()}</div></div>
    `;
    renderCharts(ok, av, disc);
    filterData();
}

function renderCharts(ok, av, disc) {
    const ctxPie = document.getElementById('chartPie').getContext('2d');
    if(STATE.charts.pie) STATE.charts.pie.destroy();
    STATE.charts.pie = new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: ['Conforme', 'À vérifier', 'Discordance', 'N.R'],
            datasets: [{ data: [ok, av, disc, STATE.rawData.length-(ok+av+disc)], backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#94a3b8'] }]
        },
        options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
    });

    const ctxBar = document.getElementById('chartBar').getContext('2d');
    const gares = {};
    STATE.rawData.forEach(r => { const g = r.Gare || "N/A"; gares[g] = (gares[g]||0)+1; });
    const sorted = Object.entries(gares).sort((a,b) => b[1]-a[1]).slice(0,10);
    
    if(STATE.charts.bar) STATE.charts.bar.destroy();
    STATE.charts.bar = new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: sorted.map(x => "G" + x[0]),
            datasets: [{ label: 'Articles', data: sorted.map(x => x[1]), backgroundColor: CONFIG.zones[STATE.activeZone === 'ADMIN'?'CEBS':STATE.activeZone].color }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } } }
    });
}

function filterData() {
    const q = document.getElementById('search').value.toLowerCase();
    STATE.filteredData = STATE.rawData.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
    
    const body = document.getElementById('tBody');
    const head = document.getElementById('tHead');
    const cols = ['ID_Immobilisation', 'Lib_Article', 'Cod_Article', 'Observation', 'Gare'];
    head.innerHTML = cols.map(c => `<th>${c.replace(/_/g,' ')}</th>`).join('');
    body.innerHTML = STATE.filteredData.slice(0, 100).map(r => `
        <tr>${cols.map(c => `<td>${r[c] || '-'}</td>`).join('')}</tr>
    `).join('');
}

function showTab(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.getElementById('p-' + id).classList.add('on');
    btn.classList.add('on');
}

function toggleTheme() { document.body.classList.toggle('dark-theme'); }
function logout() { localStorage.removeItem('drro_session'); location.reload(); }

window.onload = () => {
    const session = JSON.parse(localStorage.getItem('drro_session'));
    if (session && new Date().getTime() < session.expiry) {
        STATE.activeZone = session.zone;
        initApp();
    }
};
</script>
</body>
</html>
